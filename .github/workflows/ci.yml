name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Build DMG
        run: make dmg

      - name: Smoke test
        run: |
          .build/bundle/StatusBar.app/Contents/MacOS/StatusBar &
          APP_PID=$!
          sleep 2
          kill $APP_PID 2>/dev/null
          wait $APP_PID 2>/dev/null || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: StatusBar.dmg
          path: .build/StatusBar.dmg
